<!DOCTYPE html>
<html lang="ro">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Galerie Felină VIP</title>
    
    <style>
        body {
            margin: 0;
            padding: 20px;
            background-color: #1a1a1a;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            color: #ffffff;
        }

        .gallery-container {
            max-width: 1200px;
            margin: 0 auto;
        }

        .gallery-title {
            text-align: center;
            font-size: 2.5rem;
            letter-spacing: 2px;
            margin-bottom: 40px;
            color: #fca311;
            text-shadow: 2px 2px 4px rgba(0, 0, 0, 0.5);
        }

        .gallery-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
            gap: 25px;
        }

        .gallery-item {
            position: relative;
            border-radius: 15px;
            overflow: hidden;
            aspect-ratio: 1 / 1;
            box-shadow: 0 8px 15px rgba(0, 0, 0, 0.4);
            cursor: pointer;
            background-color: #333; /* Culoare de fundal în caz că poza nu se încarcă imediat */
        }

        .gallery-img {
            width: 100%;
            height: 100%;
            transition: transform 0.4s ease-in-out;
        }

        .gallery-item:hover .gallery-img {
            transform: scale(1.15);
        }

        .overlay {
            position: absolute;
            bottom: -100%;
            left: 0;
            width: 100%;
            height: 40%;
            background: linear-gradient(to top, rgba(0, 0, 0, 0.9), transparent);
            display: flex;
            align-items: flex-end;
            justify-content: center;
            padding-bottom: 20px;
            transition: bottom 0.4s ease-in-out;
        }

        .gallery-item:hover .overlay {
            bottom: 0;
        }

        .overlay span {
            font-size: 1.3rem;
            font-weight: bold;
            color: #fff;
            text-transform: uppercase;
            letter-spacing: 1px;
        }
    </style>
</head>
<body>

    <div class="gallery-container">
        <h1 class="gallery-title">Aristocrații Pufoși</h1>

        <div class="gallery-grid">
            <div class="gallery-item">
                <div class="gallery-img" style="background: url('img/ragdoll-g1.jpg') center/cover no-repeat;"></div>
                <div class="overlay"><span>Ragdoll 1</span></div>
            </div>
            <div class="gallery-item">
                <div class="gallery-img" style="background: url('img/ragdoll-g2.jpg') center/cover no-repeat;"></div>
                <div class="overlay"><span>Ragdoll 2</span></div>
            </div>
            <div class="gallery-item">
                <div class="gallery-img" style="background: url('img/ragdoll-g3.jpg') center/cover no-repeat;"></div>
                <div class="overlay"><span>Ragdoll 3</span></div>
            </div>

            <div class="gallery-item">
                <div class="gallery-img" style="background: url('img/bengal-g1.jpg') center/cover no-repeat;"></div>
                <div class="overlay"><span>Bengal 1</span></div>
            </div>
            <div class="gallery-item">
                <div class="gallery-img" style="background: url('img/bengal-g2.jpg') center/cover no-repeat;"></div>
                <div class="overlay"><span>Bengal 2</span></div>
            </div>
            <div class="gallery-item">
                <div class="gallery-img" style="background: url('img/bengal-g3.jpg') center/cover no-repeat;"></div>
                <div class="overlay"><span>Bengal 3</span></div>
            </div>

            <div class="gallery-item">
                <div class="gallery-img" style="background: url('img/mainecoon-g1.jpg') center/cover no-repeat;"></div>
                <div class="overlay"><span>Maine Coon 1</span></div>
            </div>
            <div class="gallery-item">
                <div class="gallery-img" style="background: url('img/mainecoon-g2.jpg') center/cover no-repeat;"></div>
                <div class="overlay"><span>Maine Coon 2</span></div>
            </div>
            <div class="gallery-item">
                <div class="gallery-img" style="background: url('img/mainecoon-g3.jpg') center/cover no-repeat;"></div>
                <div class="overlay"><span>Maine Coon 3</span></div>
            </div>

            <div class="gallery-item">
                <div class="gallery-img" style="background: url('img/british-g1.jpg') center/cover no-repeat;"></div>
                <div class="overlay"><span>British Shorthair 1</span></div>
            </div>
            <div class="gallery-item">
                <div class="gallery-img" style="background: url('img/british-g2.jpg') center/cover no-repeat;"></div>
                <div class="overlay"><span>British Shorthair 2</span></div>
            </div>
            <div class="gallery-item">
                <div class="gallery-img" style="background: url('img/british-g3.jpg') center/cover no-repeat;"></div>
                <div class="overlay"><span>British Shorthair 3</span></div>
            </div>
        </div>
    </div>

</body>
</html>
